<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0d0d1a 0%, #12122a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; color: #f0eeff;
    }
    #chat-container {
      width: 100%; max-width: 700px; height: 90vh;
      display: flex; flex-direction: column;
      border: 1px solid rgba(108,99,255,0.15); border-radius: 24px;
      overflow: hidden; background: rgba(255,255,255,0.02);
      backdrop-filter: blur(10px); box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }
    #chat-header {
      padding: 18px 24px; border-bottom: 1px solid rgba(108,99,255,0.15);
      display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.02);
    }
    #chat-header .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 0 20px rgba(108,99,255,0.4);
    }
    #chat-header .title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.5px; }
    #chat-header .status { font-size: 12px; color: #6c63ff; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    #messages {
      flex: 1; overflow-y: auto; padding: 24px 20px;
      display: flex; flex-direction: column; gap: 14px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 10px; }
    .message-row { display: flex; align-items: flex-end; gap: 10px; animation: fadeSlideIn 0.3s ease; }
    .message-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .msg-avatar.bot  { background: linear-gradient(135deg, #6c63ff, #a78bfa); }
    .msg-avatar.user { background: linear-gradient(135deg, #f472b6, #fb923c); }
    .bubble { max-width: 72%; padding: 11px 16px; font-size: 14.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: #f0eeff; }
    .bubble.bot  { background: #1a1a2e; border-radius: 18px 18px 18px 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .bubble.user { background: linear-gradient(135deg, #6c63ff, #8b7cf8); border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 15px rgba(108,99,255,0.3); }
    #typing { display: none; align-items: center; gap: 10px; animation: fadeSlideIn 0.3s ease; }
    .typing-bubble { background: #1a1a2e; border-radius: 18px 18px 18px 4px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6c63ff; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    #input-area { padding: 16px 20px; border-top: 1px solid rgba(108,99,255,0.15); }
    #input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: #1a1a2e; border-radius: 16px; padding: 10px 10px 10px 16px;
      border: 1px solid rgba(108,99,255,0.2);
    }
    #user-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #f0eeff; font-size: 14.5px; font-family: 'DM Sans', sans-serif;
      line-height: 1.5; resize: none; max-height: 120px; overflow-y: auto; padding-top: 3px;
    }
    #user-input::placeholder { color: #3a3a6a; }
    #send-btn {
      width: 38px; height: 38px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #6c63ff, #8b7cf8);
      color: white; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; box-shadow: 0 4px 15px rgba(108,99,255,0.4);
    }
    #send-btn:disabled { background: rgba(108,99,255,0.3); cursor: not-allowed; box-shadow: none; }
    #hint { text-align: center; font-size: 11px; color: #3a3a5c; margin-top: 8px; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
<div id="chat-container">
  <div id="chat-header">
    <div class="avatar">✦</div>
    <div>
      <div class="title">AI Assistant</div>
      <div class="status"><span class="status-dot"></span> Online</div>
    </div>
  </div>

  <div id="messages">
    <div class="message-row bot">
      <div class="msg-avatar bot">✦</div>
      <div class="bubble bot">Hey there! 👋 I'm your AI assistant. Ask me anything!</div>
    </div>
    <div id="typing">
      <div class="msg-avatar bot" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">✦</div>
      <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Ask me anything..."></textarea>
      <button id="send-btn">↑</button>
    </div>
    <div id="hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────────────
  // Paste your Gemini API key between the quotes below
  // ─────────────────────────────────────────────────────
  const API_KEY = "AIzaSyBTmpai99p3Q9YC9e4fknliE4Sytv493hw";

  let history = [];
  let loading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const typingEl   = document.getElementById("typing");

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addMessage(role, text) {
    const row = document.createElement("div");
    row.className = `message-row ${role}`;
    const avatar = document.createElement("div");
    avatar.className = `msg-avatar ${role}`;
    avatar.textContent = role === "bot" ? "✦" : "U";
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.insertBefore(row, typingEl);
    scrollToBottom();
  }

  function setLoading(state) {
    loading = state;
    sendBtn.disabled = state;
    typingEl.style.display = state ? "flex" : "none";
    scrollToBottom();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || loading) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    addMessage("user", text);
    history.push({ role: "user", parts: [{ text }] });
    setLoading(true);

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: "You are a helpful, friendly, and concise general assistant. Answer clearly and conversationally." }] },
            contents: history
          })
        }
      );

      const data = await response.json();

      if (data.error) {
        addMessage("bot", "⚠️ API error: " + data.error.message);
      } else {
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";
        history.push({ role: "model", parts: [{ text: reply }] });
        addMessage("bot", reply);
      }
    } catch (err) {
      addMessage("bot", "⚠️ Request failed. Check your internet connection and API key.");
    } finally {
      setLoading(false);
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });
</script>
</body>
</html>
